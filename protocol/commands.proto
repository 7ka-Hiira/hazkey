message KeyEvent {
    message Context {
        string context = 1;
        int32 anchor = 2;
    }

    enum EventType {
        EVENT_TYPE_UNSPECIFIED = 0;
        EVENT_TYPE_DOWN = 1;
        EVENT_TYPE_PRESS = 2;
        EVENT_TYPE_RELEASE = 3;
    }

    EventType event_type = 1;

    // physical key location
    optional KeyCode code = 2;

    // key symbol
    oneof input {
        SpecialKey special_key = 5;
        uint32 character = 6;
    }

    uint32 modifier = 20;

    optional Context context = 30;
}

message ClientAction {
    message ShowCandidates {
        message Candidate {
            string text = 1;
            string sub_hiragana = 2;
        }

        repeated Candidate candidates = 1;
        int32 page_size = 4;
    }

    message CloseCandidates {}

    oneof action {
        ShowCandidates show_candidates = 100;
        CloseCandidates close_candidates = 101;
        string complete = 104;
        // Add as needed
    }
}

message ClientState {
    enum TextDecoration {
        TEXT_DECORATION_NONE = 0;
        TEXT_DECORATION_UNDERLINE = 1;
    }

    message DecoratedTextPart {
        string text = 1;
        repeated TextDecoration decoration = 2;
    }

    enum InputMode {
        INPUT_MODE_NORMAL = 0;
        INPUT_MODE_DIRECT = 1;
    }

    bool filtered = 1;
    bool accepted = 2;

    int32 list_selected_index = 5;

    InputMode current_input_mode = 10;
    repeated DecoratedTextPart preedit_text = 15;
    repeated DecoratedTextPart aux_text = 20;

    repeated ClientAction actions = 100;
}

message SaveLearningData {}

message ResetState {
    bool completed_preedit = 1;
}

// message CandidatesResult {
message ShowCandidates {
    message Candidate {
        string text = 1;
        string sub_hiragana = 2;
    }

    repeated Candidate candidates = 1;
    string live_text = 2;
    int32 live_text_index = 3;
    int32 page_size = 4;
}

